services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rental-voice-agent
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: file:/app/data/dev.db
      NODE_ENV: production
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  sqlite_data:
    name: rental-voice-agent-sqlite
